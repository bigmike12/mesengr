<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mesengr social post template">
  <!-- 1080×1080 social post template. Edit text in Figma/Canva/Illustrator. Fonts: Space Grotesk (headings), Inter (body). -->
  <defs>
    <linearGradient id="sq-bg" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0F19"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="sq-glow" cx="760" cy="200" r="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D4AF37" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sq-gold" x1="80" y1="120" x2="200" y2="230" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8C766"/>
      <stop offset="1" stop-color="#C39A2A"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#sq-bg)"/>
  <rect width="1080" height="1080" fill="url(#sq-glow)"/>

  <!-- Logo lockup -->
  <g transform="translate(96,96) scale(0.19)">
    <rect width="512" height="512" rx="116" fill="#111827"/>
    <path d="M 133 350 L 133 162 L 228 252 L 323 162 L 323 350" stroke="url(#sq-gold)" stroke-width="46" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="372" cy="355" r="18" fill="url(#sq-gold)"/>
  </g>
  <text x="212" y="150" font-family="'Space Grotesk','Poppins',system-ui,sans-serif" font-size="52" font-weight="700" letter-spacing="-1" fill="#F7F8FA">Mesengr<tspan fill="#D4AF37">.</tspan></text>

  <!-- Headline -->
  <text font-family="'Space Grotesk','Poppins',system-ui,sans-serif" font-weight="700" font-size="92" letter-spacing="-3" fill="#F7F8FA">
    <tspan x="96" y="520">We build digital</tspan>
    <tspan x="96" y="624">experiences that</tspan>
    <tspan x="96" y="728">grow <tspan fill="#D4AF37">businesses.</tspan></tspan>
  </text>

  <!-- Subhead -->
  <text x="96" y="812" font-family="'Inter',system-ui,sans-serif" font-size="34" fill="#8b94a7">Strategy · Design · Development · Automation · AI</text>

  <!-- Footer CTA -->
  <rect x="96" y="900" width="360" height="84" rx="42" fill="url(#sq-gold)"/>
  <text x="276" y="952" text-anchor="middle" font-family="'Space Grotesk','Poppins',system-ui,sans-serif" font-size="32" font-weight="600" fill="#0B0F19">Book a free call</text>
  <text x="984" y="952" text-anchor="end" font-family="'Inter',system-ui,sans-serif" font-size="30" font-weight="600" fill="#D4AF37">mesengr.com</text>
</svg>
