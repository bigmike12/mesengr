<svg width="1080" height="1920" viewBox="0 0 1080 1920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mesengr story template">
  <!-- 1080×1920 story / WhatsApp status template. Fonts: Space Grotesk (headings), Inter (body). -->
  <defs>
    <linearGradient id="st-bg" x1="0" y1="0" x2="1080" y2="1920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0F19"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="st-glow" cx="760" cy="420" r="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D4AF37" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="st-gold" x1="80" y1="120" x2="200" y2="230" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8C766"/>
      <stop offset="1" stop-color="#C39A2A"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#st-bg)"/>
  <rect width="1080" height="1920" fill="url(#st-glow)"/>

  <!-- Logo lockup -->
  <g transform="translate(96,150) scale(0.22)">
    <rect width="512" height="512" rx="116" fill="#111827"/>
    <path d="M 133 350 L 133 162 L 228 252 L 323 162 L 323 350" stroke="url(#st-gold)" stroke-width="46" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="372" cy="355" r="18" fill="url(#st-gold)"/>
  </g>
  <text x="240" y="222" font-family="'Space Grotesk','Poppins',system-ui,sans-serif" font-size="56" font-weight="700" letter-spacing="-1" fill="#F7F8FA">Mesengr<tspan fill="#D4AF37">.</tspan></text>

  <!-- Headline -->
  <text font-family="'Space Grotesk','Poppins',system-ui,sans-serif" font-weight="700" font-size="104" letter-spacing="-3" fill="#F7F8FA">
    <tspan x="96" y="820">Your business</tspan>
    <tspan x="96" y="940">deserves more</tspan>
    <tspan x="96" y="1060">than just a</tspan>
    <tspan x="96" y="1180" fill="#D4AF37">website.</tspan>
  </text>

  <!-- Subhead -->
  <text x="96" y="1300" font-family="'Inter',system-ui,sans-serif" font-size="40" fill="#8b94a7">Strategy · Design · Development · AI</text>

  <!-- CTA -->
  <rect x="96" y="1660" width="440" height="104" rx="52" fill="url(#st-gold)"/>
  <text x="316" y="1726" text-anchor="middle" font-family="'Space Grotesk','Poppins',system-ui,sans-serif" font-size="40" font-weight="600" fill="#0B0F19">Book a free call</text>
  <text x="96" y="1836" font-family="'Inter',system-ui,sans-serif" font-size="36" font-weight="600" fill="#D4AF37">mesengr.com</text>
</svg>
