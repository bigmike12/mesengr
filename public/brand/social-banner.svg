<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mesengr banner template">
  <!-- 1200×630 banner / link-card / cover template. Fonts: Space Grotesk (headings), Inter (body). -->
  <defs>
    <linearGradient id="bn-bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0F19"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="bn-glow" cx="880" cy="80" r="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D4AF37" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bn-gold" x1="80" y1="60" x2="180" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8C766"/>
      <stop offset="1" stop-color="#C39A2A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bn-bg)"/>
  <rect width="1200" height="630" fill="url(#bn-glow)"/>

  <!-- Logo lockup -->
  <g transform="translate(80,72) scale(0.16)">
    <rect width="512" height="512" rx="116" fill="#111827"/>
    <path d="M 133 350 L 133 162 L 228 252 L 323 162 L 323 350" stroke="url(#bn-gold)" stroke-width="46" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="372" cy="355" r="18" fill="url(#bn-gold)"/>
  </g>
  <text x="180" y="118" font-family="'Space Grotesk','Poppins',system-ui,sans-serif" font-size="44" font-weight="700" letter-spacing="-1" fill="#F7F8FA">Mesengr<tspan fill="#D4AF37">.</tspan></text>

  <!-- Headline -->
  <text font-family="'Space Grotesk','Poppins',system-ui,sans-serif" font-weight="700" font-size="76" letter-spacing="-2" fill="#F7F8FA">
    <tspan x="80" y="330">We build digital experiences</tspan>
    <tspan x="80" y="416">that grow <tspan fill="#D4AF37">businesses.</tspan></tspan>
  </text>

  <!-- Footer -->
  <text x="80" y="540" font-family="'Inter',system-ui,sans-serif" font-size="30" fill="#8b94a7">Digital growth partner for SMEs</text>
  <text x="1120" y="540" text-anchor="end" font-family="'Inter',system-ui,sans-serif" font-size="30" font-weight="600" fill="#D4AF37">mesengr.com</text>
</svg>
